name: CI

on:
  push:
    branches: [main]
  pull_request:

# We deliberately do NOT use setup-node's npm cache. The cache feature
# requires a committed lockfile, and our first deploy hasn't happened yet —
# the lockfile will land in the repo the first time someone runs
# `npm install` locally and commits the result. Until then, `npm install`
# (without --frozen-lockfile) works fine, just a few seconds slower per run.
jobs:
  dashboard:
    runs-on: ubuntu-latest
    env:
      # Required by Prisma to generate the client. SQLite path is fine for CI.
      DATABASE_URL: "file:./prisma/ci.db"
      # Build-time placeholder; never used by tests.
      AGENT_API_KEY: "ci-placeholder-key-not-a-secret"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type check
        run: npx tsc --noEmit
