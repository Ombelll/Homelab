name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dashboard:
    runs-on: ubuntu-latest
    env:
      # Required by Prisma to generate the client. SQLite path is fine for CI.
      DATABASE_URL: "file:./prisma/ci.db"
      # Build-time placeholder; never used by tests.
      AGENT_API_KEY: "ci-placeholder-key-not-a-secret"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Test (unit)
        run: npm test

      - name: Test (integration)
        run: npm run test:integration

      - name: Build
        run: npm run build

  agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agent/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type check
        run: npx tsc --noEmit
