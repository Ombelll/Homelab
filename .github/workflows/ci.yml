name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dashboard:
    runs-on: ubuntu-latest
    env:
      # App runs on Postgres. The integration harness (tests/integration/setup.ts)
      # carves out a throwaway schema in this DB and drops it on teardown.
      DATABASE_URL: "postgresql://homelab:homelab@localhost:5432/homelab_test"
      TEST_DATABASE_URL: "postgresql://homelab:homelab@localhost:5432/homelab_test"
      # Build-time placeholder; never used by tests.
      AGENT_API_KEY: "ci-placeholder-key-not-a-secret"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: homelab
          POSTGRES_PASSWORD: homelab
          POSTGRES_DB: homelab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U homelab -d homelab_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Test (unit)
        run: npm test

      - name: Test (integration)
        run: npm run test:integration

      - name: Build
        run: npm run build

  agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agent/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type check
        run: npx tsc --noEmit
