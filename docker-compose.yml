# Homelab Control Center — local stack.
# This compose file runs the dashboard only. Agents run on each host you want
# to monitor; see /agent/README.md for that.

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: homelab-control-center:0.1.0
    container_name: homelab-dashboard
    restart: unless-stopped
    # Hardening: forbid privilege escalation and drop all Linux capabilities —
    # the dashboard is a plain Node HTTP server on :3000 and needs none.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "3000:3000"
    environment:
      # Postgres on CT 100 — required (the Prisma provider is postgresql).
      # Set DATABASE_URL in .env, e.g. postgresql://user:pass@host:5432/dbname.
      DATABASE_URL: "${DATABASE_URL:?set DATABASE_URL in your .env (postgresql://...)}"
      AGENT_API_KEY: "${AGENT_API_KEY:?set AGENT_API_KEY in your .env}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      # Protects the /api/internal/* maintenance endpoints (downsample,
      # retention, sweep, health-checks, image-update checks) that the host
      # cron drives. If unset the endpoints stay open (LAN-reachable), so set it.
      SWEEP_KEY: "${SWEEP_KEY:-}"
      # Self-heal: "1" = auto-restart an unhealthy container (cooldown + attempt
      # cap; alerts on each action and on giving up). Empty = monitor-only. Opt-in.
      DASHBOARD_AUTOHEAL: "${DASHBOARD_AUTOHEAL:-}"
      # Quiet hours (only critical alerts pushed in the window), the public
      # status-page token (/status/<token>; empty = disabled), and the €/kWh
      # used for the power-cost estimate. All optional.
      QUIET_HOURS_START: "${QUIET_HOURS_START:-}"
      QUIET_HOURS_END: "${QUIET_HOURS_END:-}"
      STATUS_PAGE_TOKEN: "${STATUS_PAGE_TOKEN:-}"
      POWER_PRICE_EUR_PER_KWH: "${POWER_PRICE_EUR_PER_KWH:-0.34}"
      # WAN page: pull speed history from speedtest-tracker. URL defaults to the
      # container name on the shared `proxy` network; token is created in the
      # speedtest-tracker UI (profile -> API Tokens). Empty token = WAN page
      # shows a "configure" hint instead of charts.
      SPEEDTEST_URL: "${SPEEDTEST_URL:-http://speedtest-tracker}"
      SPEEDTEST_API_TOKEN: "${SPEEDTEST_API_TOKEN:-}"
      NODE_ENV: production
    volumes:
      # Legacy: held the old SQLite DB before the Postgres migration. Kept
      # mounted so that pre-migration data isn't lost; unused at runtime now.
      - homelab-data:/data

    # SECURITY: we intentionally do NOT mount /var/run/docker.sock here.
    # The dashboard must never have direct access to the host's Docker socket;
    # that path runs as root and lets any caller take over the host. Container
    # control is performed by the per-host agent via an authenticated channel.

volumes:
  homelab-data:
