# AdGuard Home — network-wide DNS + ad/tracker blocking.
#
# Run from this dir:  docker compose up -d
# First-run wizard: see deploy/fase-5-services.md (Deel B) — keep the admin UI
# on :3000 inside the container; Traefik routes adguard.lan → :3000.
#
# DNS (:53) is published on the host because clients point straight at it. The
# web UI is NOT published — it's only reachable through Traefik on the `proxy`
# network, so the admin panel never sits on a raw host port.

services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      # Optional: DNS-over-TLS / DoH / DHCP — uncomment if you use them.
      # - "853:853/tcp"
    volumes:
      - adguard-work:/opt/adguardhome/work
      - adguard-conf:/opt/adguardhome/conf
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.adguard.rule=Host(`adguard.lan`)"
      - "traefik.http.routers.adguard.entrypoints=web"
      - "traefik.http.routers.adguard.middlewares=security-headers@file"
      # AdGuard's admin UI listens on :3000 inside the container (set in the wizard).
      - "traefik.http.services.adguard.loadbalancer.server.port=3000"

volumes:
  adguard-work:
  adguard-conf:

networks:
  proxy:
    external: true
