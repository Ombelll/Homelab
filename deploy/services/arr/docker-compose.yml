# *arr media-automation stack + qBittorrent + Jellyseerr — the companion to
# Jellyfin. Each app gets its own *.lan host via Traefik. Everything shares the
# existing /mnt/media bind mount (host tank/media) as /data, using the TRaSH
# single-root layout so imports are atomic hardlinks (no copy, no double space):
#
#   /data/downloads   <- qBittorrent writes here
#   /data/tv          <- Sonarr library  (Jellyfin: /mnt/media/tv)
#   /data/movies      <- Radarr library  (Jellyfin: /mnt/media/movies)
#
# No new mount or CT reboot needed — it rides /mnt/media. Create the subdirs +
# chown once (see deploy/fase-7-services.md).
#
# ⚠️ Legal: these tools automate acquiring media. Use them for content you're
# entitled to; you supply your own indexers/trackers in Prowlarr. qBittorrent
# here is NOT behind a VPN — add gluetun if your setup needs it.
#
#   docker compose --env-file /opt/Homelab/.env -f deploy/services/arr/docker-compose.yml up -d

x-common: &common
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  environment: &common-env
    PUID: "${PUID:-1000}"
    PGID: "${PGID:-1000}"
    TZ: "${TZ:-Europe/Amsterdam}"
  networks:
    - proxy

services:
  prowlarr:
    <<: *common
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    volumes:
      - prowlarr-config:/config
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.lan`)"
      - "traefik.http.routers.prowlarr.entrypoints=web"
      - "traefik.http.routers.prowlarr.middlewares=security-headers@file"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"

  sonarr:
    <<: *common
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    volumes:
      - sonarr-config:/config
      - /mnt/media:/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.lan`)"
      - "traefik.http.routers.sonarr.entrypoints=web"
      - "traefik.http.routers.sonarr.middlewares=security-headers@file"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"

  radarr:
    <<: *common
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    volumes:
      - radarr-config:/config
      - /mnt/media:/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.radarr.rule=Host(`radarr.lan`)"
      - "traefik.http.routers.radarr.entrypoints=web"
      - "traefik.http.routers.radarr.middlewares=security-headers@file"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"

  bazarr:
    <<: *common
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    volumes:
      - bazarr-config:/config
      - /mnt/media:/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.lan`)"
      - "traefik.http.routers.bazarr.entrypoints=web"
      - "traefik.http.routers.bazarr.middlewares=security-headers@file"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"

  qbittorrent:
    <<: *common
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      <<: *common-env
      WEBUI_PORT: "8080"
    volumes:
      - qbittorrent-config:/config
      - /mnt/media:/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.qbittorrent.rule=Host(`qb.lan`)"
      - "traefik.http.routers.qbittorrent.entrypoints=web"
      - "traefik.http.routers.qbittorrent.middlewares=security-headers@file"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"

  jellyseerr:
    <<: *common
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      TZ: "${TZ:-Europe/Amsterdam}"
    volumes:
      - jellyseerr-config:/app/config
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.jellyseerr.rule=Host(`requests.lan`)"
      - "traefik.http.routers.jellyseerr.entrypoints=web"
      - "traefik.http.routers.jellyseerr.middlewares=security-headers@file"
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"

volumes:
  prowlarr-config:
  sonarr-config:
  radarr-config:
  bazarr-config:
  qbittorrent-config:
  jellyseerr-config:

networks:
  proxy:
    external: true
