# Traefik v3 reverse proxy for the homelab Docker LXC (CT 101).
#
# Run from this directory:
#   docker network create proxy        # once
#   docker compose -f docker-compose.traefik.yml up -d
#
# Services join the `proxy` network and opt in with traefik.* labels — see
# ../docker-compose.labels.yml for the dashboard example.
#
# SECURITY: Traefik does NOT mount the raw /var/run/docker.sock. The socket is
# root-equivalent — anyone who reaches it owns the host. Instead a scoped,
# read-only docker-socket-proxy sits on an internal network and exposes only
# the container/network read endpoints Traefik needs. This mirrors the
# repo-wide rule in AGENTS.md ("the dashboard never touches the Docker socket").

services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: traefik-socket-proxy
    restart: unless-stopped
    environment:
      # Read-only access to exactly what the Traefik docker provider reads.
      CONTAINERS: 1
      # VERSION + PING let Traefik's docker client negotiate the API version via
      # /version and /_ping. Required on Docker 29+ (the daemon dropped API 1.24).
      VERSION: 1
      PING: 1
      NETWORKS: 1
      # Everything else stays denied (the image defaults most to 0), and POST
      # is off so nothing can start/stop/mutate containers through this proxy.
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - socket
    # No published ports: only reachable by Traefik over the internal network.

  traefik:
    image: traefik:v3.5
    container_name: traefik
    restart: unless-stopped
    environment:
      # Docker Engine 29 dropped API < 1.40, but Traefik's docker client still
      # pins 1.24 and ignores this var (kept for documentation). The working fix
      # is DOCKER_MIN_API_VERSION=1.24 on the daemon (host systemd drop-in:
      # /etc/systemd/system/docker.service.d/min-api.conf) so the daemon accepts
      # Traefik's 1.24 requests. Without it the docker provider loads no routers.
      DOCKER_API_VERSION: "1.44"
    depends_on:
      - socket-proxy
    ports:
      - "80:80"
      # LAN HTTPS: Traefik terminates TLS on :443. Bound to the LAN IP only —
      # the tailnet IP's :443 belongs to tailscaled (Tailscale Serve).
      - "192.168.1.21:443:443"
    volumes:
      # No docker.sock here — Traefik talks to socket-proxy (see traefik.yml).
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
      # Local-CA cert for *.lan, served as the websecure default certificate.
      - ./certs:/certs:ro
      # - ./acme:/acme   # Let's Encrypt path: persist issued certs
    networks:
      - proxy
      - socket
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # environment (Let's Encrypt DNS-01 path):
    #   CF_DNS_API_TOKEN: "${CF_DNS_API_TOKEN}"

networks:
  proxy:
    external: true
  # Internal-only link between Traefik and the socket proxy. `internal: true`
  # means no container on it can reach (or be reached from) the outside.
  socket:
    internal: true
