# Traefik v3 reverse proxy for the homelab Docker LXC (CT 101).
#
# Run from this directory:
#   docker network create proxy        # once
#   docker compose -f docker-compose.traefik.yml up -d
#
# Services join the `proxy` network and opt in with traefik.* labels — see
# ../docker-compose.labels.yml for the dashboard example.

services:
  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      # Uncomment only on the Let's Encrypt path (TLS terminates at Traefik).
      # On the default Tailscale-Serve path, TLS terminates upstream — leave off.
      # - "443:443"
    volumes:
      # Read-only docker socket for label discovery. This is the standard
      # Traefik pattern, but the socket is root-equivalent — see the security
      # note in fase-4-traefik-https.md for the socket-proxy hardening option.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
      # - ./acme:/acme   # Let's Encrypt path: persist issued certs
    networks:
      - proxy
    # environment:
    #   CF_DNS_API_TOKEN: "${CF_DNS_API_TOKEN}"   # Let's Encrypt DNS-01 path

networks:
  proxy:
    external: true
