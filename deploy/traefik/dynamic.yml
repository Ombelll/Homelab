# Traefik v3 dynamic configuration (file provider).
# Reusable middlewares + the optional Traefik dashboard router.

http:
  middlewares:
    # Sane security headers for every service that opts in via
    # `traefik.http.routers.<name>.middlewares=security-headers@file`.
    security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        # HSTS only makes sense once HTTPS terminates here (Let's Encrypt path).
        # With Tailscale Serve fronting plain :80 it's harmless to leave off.
        # stsSeconds: 31536000
        # stsIncludeSubdomains: true

    # Reusable rate limiter — opt in per router with
    # `traefik.http.routers.<name>.middlewares=rate-limit@file`. Protects
    # exposed services (e.g. anything you publish beyond the tailnet) from
    # brute-force / runaway clients. Tune to taste.
    rate-limit:
      rateLimit:
        average: 100      # sustained requests/second per source
        burst: 50         # short spikes allowed above the average

    # authentik forward-auth. Opt a router in with
    # `traefik.http.routers.<name>.middlewares=security-headers@file,authentik@file`
    # to gate it behind authentik SSO. Unauthenticated requests are 302'd to the
    # login flow; the embedded outpost (inside authentik-server, reachable by
    # container name on the `proxy` network) verifies the session and returns the
    # X-authentik-* identity headers to the upstream app. The
    # PathPrefix(`/outpost.goauthentik.io/`) router lives on the authentik-server
    # container (see deploy/services/authentik) so the callback resolves on every
    # protected host.
    authentik:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-entitlements
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version

    # Basic-auth gate for the Traefik dashboard. Generate a user:hash with:
    #   htpasswd -nbB admin 'your-password'
    # then paste the (escaped) line below.
    traefik-auth:
      basicAuth:
        users:
          - "admin:$2y$05$REPLACE_WITH_A_BCRYPT_HASH"

  routers:
    # Traefik's own dashboard at http://<host>/  →  optional, behind auth.
    # Uncomment and set a Host to enable it.
    # traefik-dashboard:
    #   rule: "Host(`traefik.lan`)"
    #   entrypoints: [web]
    #   service: api@internal
    #   middlewares: [traefik-auth]

# LAN HTTPS default certificate. The websecure entrypoint (traefik.yml) serves
# this local-CA cert for every *.lan host. Files are mounted at /certs in the
# compose file; regenerate with deploy/https-proxy/gen-certs.sh (explicit SANs
# per host, since schannel/curl reject a bare *.lan wildcard).
tls:
  stores:
    default:
      defaultCertificate:
        certFile: /certs/lan.crt
        keyFile: /certs/lan.key
