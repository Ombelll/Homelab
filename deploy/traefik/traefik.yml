# Traefik v3 static configuration.
#
# Two TLS paths exist in this repo:
#  * Tailnet: Tailscale Serve fronts plain :80 and provides HTTPS for the tailnet.
#  * LAN (active): Traefik itself terminates TLS on `websecure` (:443) with a
#    local-CA wildcard/SAN cert (see deploy/https-proxy/gen-certs.sh), so every
#    *.lan host is valid HTTPS on the LAN. The cert is mounted at /certs and the
#    default store is set in dynamic.yml. Traefik publishes 443 on the LAN IP
#    192.168.1.21 only (the tailnet IP's :443 belongs to tailscaled).
#
# NB: Docker Engine 29 dropped API < 1.40; Traefik's docker client pins 1.24, so
# the daemon needs `DOCKER_MIN_API_VERSION=1.24` (systemd drop-in on the host) —
# see the compose file's note. Without it the docker provider loads no routers.

global:
  checkNewVersion: false
  sendAnonymousUsage: false

entryPoints:
  web:
    address: ":80"
  # LAN HTTPS: Traefik terminates TLS here with the default cert from dynamic.yml
  # (tls.stores.default). Published on 192.168.1.21:443 in the compose file.
  websecure:
    address: ":443"
    http:
      tls: {}
  # Internal-only entrypoint for the /ping healthcheck (see `ping` below). Not
  # published in compose, so it's only reachable inside the container for the
  # `traefik healthcheck` probe.
  ping:
    address: ":8082"
  # --- Let's Encrypt path only: swap the websecure tls above for a certResolver.
  #     http:
  #       tls:
  #         certResolver: le

# Liveness endpoint used by the compose healthcheck (`traefik healthcheck --ping`).
ping:
  entryPoint: ping

providers:
  # Discover services from Docker labels via the scoped socket-proxy — NOT the
  # raw docker.sock. Only services that opt in (exposedByDefault: false) and
  # sit on the `proxy` network are routed.
  docker:
    endpoint: "tcp://socket-proxy:2375"
    exposedByDefault: false
    network: proxy
  # File provider for middlewares and any static routers.
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

# Traefik's own dashboard. Never exposed insecurely; routed (and protected)
# via a labelled router in dynamic.yml if you want it.
api:
  dashboard: true
  insecure: false

# JSON logs so the dashboard / a log shipper can parse them later.
log:
  level: INFO
  format: json
accessLog:
  format: json

# --- Let's Encrypt path only: DNS-01 challenge (no public IP needed).
